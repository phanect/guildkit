  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          check-latest: true
          cache: pnpm

      - run: cp ./.env.example ./.env
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

